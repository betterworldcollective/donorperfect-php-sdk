name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review (for manual runs)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Resolve PR context
        id: context
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
            echo "HEAD_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
            echo "BASE_SHA=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
          else
            echo "PR_NUMBER=${{ inputs.pr_number }}" >> $GITHUB_ENV
            # Head/base SHAs are optional for manual runs
            echo "HEAD_SHA=" >> $GITHUB_ENV
            echo "BASE_SHA=" >> $GITHUB_ENV
          fi

      - name: Generate PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff "$PR_NUMBER" --patch > diff.patch
          # Truncate very large diffs to keep review fast
          MAX_LINES=1200
          LINES=$(wc -l < diff.patch || echo 0)
          if [ "$LINES" -gt "$MAX_LINES" ]; then
            head -n $MAX_LINES diff.patch > diff.truncated && mv diff.truncated diff.patch
            echo "Truncated diff to ${MAX_LINES} lines to keep analysis fast."
          fi

      - name: Ensure jq is available
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Perform Cursor review (inline + summary)
        continue-on-error: true
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_PROMPT: |
            You are an automated reviewer running in GitHub Actions for a PHP SDK. Review ONLY the unified diff below and return STRICT JSON.

            Goals:
            - Identify up to 8 high-signal issues on CHANGED LINES ONLY.
            - Prioritize security, logic, API misuse, breaking changes, missing tests.
            - Be concise and actionable.
            - Ignore: vendor/**, .github/**, **/*.md, **/*.json, **/*.lock, **/*.svg, **/*.png, **/*.jpg.

            Output JSON schema (no markdown, no comments):
            {
              "comments": [
                {
                  "path": "relative/file.php",
                  "line": 123,
                  "body": "1-2 sentence suggestion for this specific line"
                }
              ],
              "summary": "2-3 sentences summarizing the most important issues"
            }

            Diff:
        run: |
          REPO=${{ github.repository }}
          printf "%s\n" "$PR_PROMPT" > prompt.txt
          cat diff.patch >> prompt.txt

          # Determine head SHA if not provided (manual runs)
          if [ -z "${HEAD_SHA}" ]; then
            HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          fi

          # Ask Cursor to produce structured JSON
          if command -v timeout >/dev/null 2>&1; then
            timeout 120s cursor-agent --force --output-format=json --print "$(cat prompt.txt)" > review.json || true
            EXIT_CODE=$?
          else
            cursor-agent --force --output-format=json --print "$(cat prompt.txt)" > review.json || true
            EXIT_CODE=$?
          fi

          # Validate JSON; fallback to empty if invalid or timeout
          if ! jq -e . review.json >/dev/null 2>&1 || [ "$EXIT_CODE" -eq 124 ]; then
            echo '{"comments":[],"summary":"Automated review timed out or returned invalid output."}' > review.json
          fi

          # Post inline comments (max 8)
          jq -c '.comments // [] | .[:8][]' review.json | while read -r c; do
            PATH_FILE=$(echo "$c" | jq -r '.path // empty')
            LINE_NUM=$(echo "$c" | jq -r '.line // empty')
            BODY=$(echo "$c" | jq -r '.body // empty')
            if [ -n "$PATH_FILE" ] && [ -n "$LINE_NUM" ] && [ -n "$BODY" ]; then
              gh api repos/$REPO/pulls/$PR_NUMBER/comments -f commit_id="$HEAD_SHA" -f path="$PATH_FILE" -F line=$LINE_NUM -f side=RIGHT -f body="$BODY" || true
            fi
          done

          # Post summary comment
          SUMMARY=$(jq -r '.summary // "Automated review completed."' review.json)
          gh pr review $PR_NUMBER --comment --body "$SUMMARY"

